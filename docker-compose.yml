version: '3.8'

services:
  # Redis backend for message brokering
  redis-broker:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # First GO server instance
  chat-node-a:
    build: .
    ports:
      - "8081:8080"
    environment:
      - REDIS_URL=redis-broker:6379
    depends_on:
      - redis-broker
    
    # use the watch mode of docker compose
    develop:
      watch:
        - action: sync
          path: ./index/home.html
          target: /app/index/home.html
        - action: rebuild
          path: .
        

  # Second GO server instance
  chat-node-b:
    build: .
    ports:
      - "8082:8080"
    environment:
      - REDIS_URL=redis-broker:6379
    depends_on:
      - redis-broker 
    # use the watch mode of docker compose
    develop:
      watch:
        - action: sync
          path: ./index/home.html
          target: /app/index/home.html
        - action: rebuild
          path: .
        
  # Third GO server instance
  chat-node-c:
    build: .
    ports:
      - "8083:8080"
    environment:
      - REDIS_URL=redis-broker:6379
    depends_on:
      - redis-broker 
    # use the watch mode of docker compose
    develop:
      watch:
        - action: sync
          path: ./index/home.html
          target: /app/index/home.html
        - action: rebuild
          path: .