<!DOCTYPE html>
<html lang="en">
<head>
<title>Targeted Routing Node</title>
<script type="text/javascript">
window.onload = function () {
    var conn;
    var msg = document.getElementById("msg");
    var myId = document.getElementById("myId");
    var targetId = document.getElementById("targetId");
    var log = document.getElementById("log");

    function appendLog(item) {
        var doScroll = log.scrollTop > log.scrollHeight - log.clientHeight - 1;
        log.appendChild(item);
        if (doScroll) {
            log.scrollTop = log.scrollHeight - log.clientHeight;
        }
    }

    document.getElementById("form").onsubmit = function () {
        if (!conn) { return false; }
        if (!msg.value || !myId.value || !targetId.value) { return false; }
        
        // THE CORE SHIFT: Packaging the raw text into a structured JSON envelope
        var payload = {
            sender_id: myId.value,
            target_id: targetId.value,
            content: msg.value
        };
        
        // Send the JSON string to the Go backend
        conn.send(JSON.stringify(payload));
        
        // Print our own message to the screen and clear the input
        var item = document.createElement("div");
        item.innerHTML = "<i>Me -> " + targetId.value + ":</i> " + msg.value;
        appendLog(item);
        msg.value = "";
        return false;
    };

    if (window["WebSocket"]) {
        // We connect to the WebSocket endpoint
        conn = new WebSocket("ws://" + document.location.host + "/ws");
        conn.onclose = function (evt) {
            var item = document.createElement("div");
            item.innerHTML = "<b>Connection closed.</b>";
            appendLog(item);
        };
        conn.onmessage = function (evt) {
            var messages = evt.data.split('\n');
            for (var i = 0; i < messages.length; i++) {
                var item = document.createElement("div");
                item.innerText = messages[i];
                appendLog(item);
            }
        };
    } else {
        var item = document.createElement("div");
        item.innerHTML = "<b>Your browser does not support WebSockets.</b>";
        appendLog(item);
    }
};
</script>
<style type="text/css">
html { overflow: hidden; }
body { overflow: hidden; padding: 0; margin: 0; width: 100%; height: 100%; background: #222; font-family: monospace; color: #0f0; }
#log { background: #111; margin: 0; padding: 0.5em; position: absolute; top: 0.5em; left: 0.5em; right: 0.5em; bottom: 3em; overflow: auto; border: 1px solid #0f0; }
#form { padding: 0 0.5em; margin: 0; position: absolute; bottom: 1em; left: 0px; width: 100%; overflow: hidden; }
input { background: #000; color: #0f0; border: 1px solid #0f0; padding: 5px; margin-right: 5px; }
</style>
</head>
<body>
<div id="log"></div>
<form id="form">
    <input type="text" id="myId" placeholder="My ID (e.g., node_A)" size="15" required />
    <input type="text" id="targetId" placeholder="Target ID (e.g., node_B)" size="15" required />
    <input type="text" id="msg" placeholder="Message payload..." size="40" required />
    <input type="submit" value="Transmit" />
</form>
</body>
</html>
